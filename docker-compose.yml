services:
  # ─────────────────────────────────────────────────────────────
  # PostgreSQL 16 — base de données partagée
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sav-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sav_db}
      POSTGRES_USER: ${POSTGRES_USER:-sav_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sav_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./backend/migrations/002_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    # ports:
    # - "127.0.0.1:5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-sav_user} -d ${POSTGRES_DB:-sav_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────────────────────
  # Backend SAV — unified API (auth, conversations, factures, articles, sav)
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sav-backend
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-sav_user}:${POSTGRES_PASSWORD:-sav_password}@postgres:5432/${POSTGRES_DB:-sav_db}
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/c88c52a0-fa1e-4bec-9b40-11d2a06585bf/chat
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-changeme}
      N8N_INTERNAL_KEY: ${N8N_INTERNAL_KEY:-change_this_internal_key_min32chars}
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3002:3002"
      - "127.0.0.1:3000:3002" # backward compatibility (factures API was on 3000)
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────
  # Frontend — Vite + React dev server (port 5173)
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sav-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:3002/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend

  # ─────────────────────────────────────────────────────────────
  # n8n — orchestrateur AI Agent
  # ─────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: sav-n8n
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-changeme}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-this-32-char-key-now-!}
      N8N_INTERNAL_KEY: ${N8N_INTERNAL_KEY:-change_this_internal_key_min32chars}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      DB_TYPE: sqlite
      WEBHOOK_URL: http://localhost:5678
      N8N_PROTOCOL: http
      N8N_HOST: localhost
      N8N_PORT: 5678
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: ${N8N_EXECUTIONS_DATA_MAX_AGE:-720}
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "true"
      GENERIC_TIMEZONE: Europe/Paris
      TZ: Europe/Paris
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ─────────────────────────────────────────────────────────────
  # Ollama — LLM local CPU
  # ─────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    container_name: sav-ollama
    restart: unless-stopped
    environment:
      - OLLAMA_NO_GPU=1
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
    driver: local
  n8n_data:
    driver: local
  ollama_data:
    driver: local
