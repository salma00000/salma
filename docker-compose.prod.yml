# Production compose — backend + postgres.
# Prerequisites on VPS:
#   - The 'caddy_net' Docker network already exists (created by Caddy)
#   - A .env file is present at this path (see .env.example)

services:
  # ─────────────────────────────────────────────────────────────
  # PostgreSQL 16 — not exposed externally (localhost-only)
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sav_db}
      POSTGRES_USER: ${POSTGRES_USER:-sav_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sav_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port not published — only reachable by other containers on the same network
    networks:
      - backend_net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-sav_user} -d ${POSTGRES_DB:-sav_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────────────────────
  # Backend SAV — unified API
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: sav-backend:latest
    container_name: sav-backend
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3002
      NODE_ENV: production
      CORS_ORIGIN: https://sav.sparkedge-solutions.com
      DATABASE_URL: postgresql://${POSTGRES_USER:-sav_user}:${POSTGRES_PASSWORD:-sav_password}@postgres:5432/${POSTGRES_DB:-sav_db}
      # n8n is in a separate Docker container — reach it via the host network
      N8N_WEBHOOK_URL: http://host.docker.internal:5678/webhook/c88c52a0-fa1e-4bec-9b40-11d2a06585bf/chat
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-changeme}
      N8N_INTERNAL_KEY: ${N8N_INTERNAL_KEY}
      JWT_SECRET: ${JWT_SECRET}
    extra_hosts:
      # Allows the container to reach services on the Docker host (e.g. n8n)
      # Required on Linux; Docker Desktop (Mac/Win) provides it automatically
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - caddy_net
      - backend_net

volumes:
  postgres_data:

networks:
  caddy_net:
    external: true
  backend_net:
    driver: bridge
