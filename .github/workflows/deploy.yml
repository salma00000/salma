name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy backend to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Verify the commit that triggered the run ──────────────────────────
      - name: Checkout (for context only)
        uses: actions/checkout@v4

      # ── 2. SSH into VPS and deploy ───────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          #   passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -euo pipefail

            # ── Navigate to project directory ──────────────────────────────
            cd "${{ secrets.VPS_PROJECT_PATH }}"

            # ── Pull latest code ───────────────────────────────────────────
            echo ">>> Pulling latest code..."
            git fetch --all
            git reset --hard origin/main

            # ── Build & restart backend container ──────────────────────────
            echo ">>> Building and starting backend..."
            docker compose -f docker-compose.prod.yml build --no-cache backend
            docker compose -f docker-compose.prod.yml up -d --remove-orphans backend

            # ── Wait for health check ──────────────────────────────────────
            echo ">>> Waiting for backend health check..."
            attempt=0
            max=15
            until curl -sf http://localhost:3002/health > /dev/null; do
              attempt=$((attempt + 1))
              if [ $attempt -ge $max ]; then
                echo "ERROR: Backend did not become healthy after $max attempts."
                docker compose -f docker-compose.prod.yml logs --tail=50 backend
                exit 1
              fi
              echo "  Attempt $attempt/$max — waiting 5s..."
              sleep 5
            done

            echo ">>> Deployment successful!"
            docker compose -f docker-compose.prod.yml ps backend

      # ── 3. Notify on failure ─────────────────────────────────────────────────
      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Deployment to VPS failed. Check the SSH step logs above."

  deploy-frontend:
    name: Build & deploy frontend to OVH
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Deploy to OVH via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.OVH_FTP_HOST }}
          username: ${{ secrets.OVH_FTP_USER }}
          password: ${{ secrets.OVH_FTP_PASSWORD }}
          port: ${{ secrets.OVH_FTP_PORT || 21 }}
          local-dir: frontend/dist/
          server-dir: ${{ secrets.OVH_FTP_REMOTE_DIR || 'www/' }}
          # Only upload changed files (faster subsequent deploys)
          state-name: .ftp-deploy-sync-state.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
