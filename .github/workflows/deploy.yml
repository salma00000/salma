name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy backend to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Verify the commit that triggered the run ──────────────────────────
      - name: Checkout (for context only)
        uses: actions/checkout@v4

      # ── 2. SSH into VPS and deploy ───────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            # ── Navigate to project directory ──────────────────────────────
            cd "${{ secrets.VPS_PROJECT_PATH }}"

            # ── Pull latest code ───────────────────────────────────────────
            echo ">>> Pulling latest code..."
            git fetch --all
            git reset --hard origin/main

            # ── Build & restart backend container ──────────────────────────
            echo ">>> Building and starting backend..."
            docker compose -f docker-compose.prod.yml build --no-cache backend
            docker compose -f docker-compose.prod.yml up -d --remove-orphans backend

            # ── Wait for health check ──────────────────────────────────────
            echo ">>> Waiting for backend health check..."
            attempt=0
            max=15
            until curl -sf http://127.0.0.1:3001/health > /dev/null; do
              attempt=$((attempt + 1))
              if [ $attempt -ge $max ]; then
                echo "ERROR: Backend did not become healthy after $max attempts."
                docker compose -f docker-compose.prod.yml logs --tail=50 backend
                exit 1
              fi
              echo "  Attempt $attempt/$max — waiting 5s..."
              sleep 5
            done

            echo ">>> Deployment successful!"
            docker compose -f docker-compose.prod.yml ps backend

      # ── 3. Notify on failure ─────────────────────────────────────────────────
      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Deployment to VPS failed. Check the SSH step logs above."
